<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripWay-Contato</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body style="font-family: Poppins, sans-serif; margin: 0;">

    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px;">
        <a href="../index.html" style="text-decoration: none; font-weight: bold;">TripWay</a>

        <ul style="list-style: none; display: flex; gap: 20px; margin: 0;">
            <li><a href="destinos.html" text-decoration: none;">Destinos</a></li>
            <li><a href="pacotes.html" text-decoration: none;">Pacotes</a></li>
            <li><a href="contato.html" text-decoration: none;">Reserva</a></li>
        </ul>
    </nav>

    <main style="display: flex; justify-content: center; padding: 20px;">
        <section style="width: 100%; max-width: 600px; text-align: center;">

            <h1>Faça sua reserva conosco agora</h1>

            <img src="../images/banner-reserva.jpeg" alt="Banner de reservas"
                style="width: 100%; border-radius: 10px; margin: 15px 0;">

            <form style="display: flex; flex-direction: column; text-align: left;">
                <h2 style="text-align: center;">Informações para Reserva</h2>

                <label>Nome:</label>
                <input type="text" required
                    style="padding: 8px; margin-bottom: 10px; border-radius: 5px; border: 1px solid">

                <label>E-mail:</label>
                <input type="email" required
                    style="padding: 8px; margin-bottom: 10px; border-radius: 5px; border: 1px solid">

                <label>Destino de interesse:</label>
                <select style="padding: 8px; margin-bottom: 10px; border-radius: 5px;">
                    <option>São Paulo</option>
                    <option>Rio de Janeiro</option>
                    <option>Salvador</option>
                </select>

                <label>Data:</label>
                <input type="date" required
                    style="padding: 8px; margin-bottom: 10px; border-radius: 5px; border: 1px solid">

                <label>Quantidade de pessoas:</label>
                <input type="number" required
                    style="padding: 8px; margin-bottom: 10px; border-radius: 5px; border: 1px solid">

                <label>Mensagem:</label>
                <textarea placeholder="Deixe sua mensagem..."
                    style="padding: 8px; margin-bottom: 10px; border-radius: 5px;"></textarea>

                <button type="submit" style="padding: 10px;border: none; border-radius: 5px;">
                    Envie sua Reserva
                </button>
            </form>

            <a href="../index.html" 
             style="display: inline-block; margin-top: 10px; padding: 10px 15px; text-decoration: none; border-radius: 5px;">
             ← Voltar
            </a>  

        </section>
    </main>
    <footer style="text-align: center; padding: 20px; margin-top: 20px;">

        <p style="margin: 5px 0;">© 2026 TripWay - Todos os direitos reservados</p>

        <p style="margin: 5px 0;">
            Contato: tripway@email.com
        </p>

        <div style="margin-top: 10px;">
            <a href="#" style="margin: 0 10px; text-decoration: none;">Instagram</a>
            <a href="#" style="margin: 0 10px; text-decoration: none;">Facebook</a>
            <a href="#" style="margin: 0 10px; text-decoration: none;">WhatsApp</a>
        </div>

    </footer>

</body>

</html>
