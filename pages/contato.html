<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>

<body>

    <main>
        <section>
            <h2>Faça sua reserva consoco agora</h2>
            <form>
                <h2>Informações para Reserva</h2>

                <label for="name">Nome:</label><br>
                <input type="text" id="name" required><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" required><br>

                <label for="destino">Destino de interesse:</label><br>
                <input type="text" id="destino" required><br>

                <label for="data">Data:</label><br>
                <input type="date" id="data" required><br>

                <label for="number">Quantidade de pessoas:</label><br>
                <input type="number" id="pessoas" required><br>

                <label for="comments">Mensagem: </label><br>
                <textarea id="comments" placeholder="Deixe sua mensagem..."></textarea><br>

                <button type="submit">Envie sua Reserva</button>
            </form>
        </section>
    </main>

</body>

</html>
