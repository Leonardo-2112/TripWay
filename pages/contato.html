<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripWay-Contato</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body style="font-family: Poppins">
    <nav>
      <a href="../index.html">TripWay</a>
      <ul>
        <li><a href="pacotes.html">Pacotes</a></li>
        <li><a href="destinos.html">Destinos</a></li>
        <li><a href="contato.html">Reserva</a></li>
      </ul>
    </nav>

    <main>
        <section>
            <h1>Faça sua reserva consoco agora</h1>
            <form>
                <h2>Informações para Reserva</h2>

                <label for="name">Nome:</label><br>
                <input type="text" id="name" required><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" required><br>

                <label for="destino">Destino de interesse:</label><br>
                    <select id="destino">
                    <option value="destino1">São Paulo</option>
                    <option value="destino2">Rio de Janeiro</option>
                    <option value="destino3">Salvador</option>
                </select><br>
                

                <label for="data">Data:</label><br>
                <input type="date" id="data" required><br>

                <label for="number">Quantidade de pessoas:</label><br>
                <input type="number" id="pessoas" required><br>

                <label for="comments">Mensagem: </label><br>
                <textarea id="comments" placeholder="Deixe sua mensagem..."></textarea><br>

                <button type="submit">Envie sua Reserva</button>
            </form>
        </section>
    </main>

</body>

</html>
