<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>

<body>

    <main>
        <section>
            <h2>Entre em contato conosco!</h2>
            <form>
                <h2>Informações de contato</h2>

                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required><br><br>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required><br><br>
                <label for="destino">Destino de interesse:</label>
                <select id="destino">
                    <option value="destino1">Australia</option>
                    <option value="destino2">Brasil</option>
                    <option value="destino3">Londres</option>
                </select><br><br>
                <label for="data">Data:</label>
                <input type="date" id="data" name="data" required><br><br>
                <label for="number">Quantidade de pessoas:</label>
                <input type="number" id="pessoas" name="pessoas" min="1" max="10" required><br><br>
                <label for="comments">Mensagem: </label><br>
                <textarea id="comments" name="comments" placeholder="Deixe sua mensagem..." rows="4"
                    cols="50"></textarea><br>
                <button onclick="alert ('MENSAGEM ENVIADA!')">Envie sua mensagem</button>
            </form>
        </section>
    </main>

</body>

</html>
